<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Tests — calculerMontants()</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: monospace; font-size: 13px; background: #0d1117; color: #c9d1d9; padding: 24px; }
      h1 { color: #58a6ff; margin-bottom: 4px; font-size: 16px; }
      .meta { color: #8b949e; margin-bottom: 20px; font-size: 11px; }
      .suite { margin-bottom: 20px; }
      .suite-title { color: #e6edf3; font-size: 13px; font-weight: bold;
                     border-left: 3px solid #30363d; padding-left: 10px;
                     margin-bottom: 6px; }
      .line { padding: 3px 0 3px 14px; border-left: 3px solid transparent; }
      .pass { border-color: #238636; color: #3fb950; }
      .fail { border-color: #da3633; color: #f85149; }
      .fail .detail { color: #8b949e; font-size: 11px; margin-left: 16px; }
      .summary { margin-top: 24px; padding: 12px 16px; border-radius: 6px;
                 font-size: 14px; font-weight: bold; }
      .summary.all-pass { background: #0f2d1a; color: #3fb950; border: 1px solid #238636; }
      .summary.has-fail { background: #2d0f0f; color: #f85149; border: 1px solid #da3633; }
    </style>
  </head>
  <body>
    <h1>🧪 Tests unitaires — calculerMontants()</h1>
    <p class="meta">Chargement de engine.js + data.json…</p>
    <div id="output"></div>

    <!-- engine.js en dernier pour récupérer les globaux après son chargement -->
    <script src="engine.js"></script>
    <script>
      // ─────────────────────────────────────────────────────────────────────────
      // On court-circuite window.onload défini par engine.js.
      // On charge data.json manuellement, puis on lance les tests.
      // ─────────────────────────────────────────────────────────────────────────
      window.onload = async () => {
        const meta = document.querySelector(".meta");

        try {
          const resp = await fetch("data.json");
          if (!resp.ok) throw new Error("Impossible de charger data.json");
          baseDonnees = await resp.json(); // injecte dans le global engine.js
          meta.textContent = `data.json chargé (barème ${baseDonnees.meta?.version ?? "?"})`;
        } catch (e) {
          meta.style.color = "#f85149";
          meta.textContent = `❌ ${e.message}`;
          return;
        }

        lancerTests();
      };

      // ─────────────────────────────────────────────────────────────────────────
      // Mini framework de test
      // ─────────────────────────────────────────────────────────────────────────
      let passed = 0, failed = 0;
      const suites = [];
      let currentSuite = null;

      function suite(titre, fn) {
        currentSuite = { titre, lignes: [] };
        suites.push(currentSuite);
        fn();
      }

      /**
       * Compare deux nombres après arrondi à 2 décimales pour absorber
       * les dérives floating-point des additions intermédiaires.
       */
      function eq(label, actual, expected) {
        const a = Math.round(actual  * 100) / 100;
        const e = Math.round(expected * 100) / 100;
        if (a === e) {
          passed++;
          currentSuite.lignes.push({ ok: true, label });
        } else {
          failed++;
          currentSuite.lignes.push({ ok: false, label, actual: a, expected: e });
        }
      }

      // ─────────────────────────────────────────────────────────────────────────
      // Profil de base réutilisable — ING.DIV échelon 03, Zone 3, 0 enfant
      // ─────────────────────────────────────────────────────────────────────────
      function profil(overrides = {}) {
        return {
          grade:      "ING.DIV. CONT.NAV.AE",
          echelon:    "03",
          zone:       "Zone 3",
          taux_pas:   0.196,
          points_nbi: 0,
          enfants:    0,
          evenements: {
            nuits: 0, soirees: 0,
            jours_greve: 0, jours_carence: 0,
            jours_maladie_90: 0, jours_maladie_50: 0,
            prime_performance: 0,
            ott_pf: 0, ott_pv_globale: 0, ott_pv_opt32: 0,
          },
          primes: {
            forfait_mobilites: 0,
            rist_fonctions: 0, rist_exper_prof: 0,
            rist_lic_isq: 0, rist_cplt_lic_isq: 0, rist_maj_isq: 0,
            attractivite: 0, fidelisation: 0, inflation: 0,
            ind_compensatrice_csg: 0, psc: 0,
          },
          ...overrides,
        };
      }

      // ─────────────────────────────────────────────────────────────────────────
      // TESTS
      // ─────────────────────────────────────────────────────────────────────────
      function lancerTests() {

        // ── T1 : Traitement de base ─────────────────────────────────────────────
        suite("T1 — Base seule (ING.DIV éch.03 | Zone 3 | 0 enfant)", () => {
          const m = calculerMontants(profil());
          eq("indice → traitementBrut = 462 × 4.92278",         m.traitementBrut,       2274.32);
          eq("montantNbi = 0 (NBI désactivée)",                  m.montantNbi,           0);
          eq("indemniteResidence = 0 (Zone 3 = 0%)",            m.indemniteResidence,   0);
          eq("baseSoumisePC = traitementBrut",                   m.baseSoumisePC,        2274.32);
          eq("retenuePC = baseSoumisePC × 11,1%",               m.retenuePC,            252.45);
          eq("cotisationRafp = 0 (aucune prime)",                m.cotisationRafp,       0);
          eq("transfertPrimes = 32,42 (aucune absence)",        m.transfertPrimes,      32.42);
          eq("csgDeductible",                                    m.csgDeductible,        149.78);
          eq("csgNonDeductible",                                 m.csgNonDeductible,     52.86);
          eq("crds",                                             m.crds,                 11.01);
          eq("montantSFT = 0 (0 enfant)",                       m.montantSFT,           0);
          eq("totalPatronal",                                    m.totalPatronal,        2282.28);
        });

        // ── T2 : NBI activée ───────────────────────────────────────────────────
        suite("T2 — NBI activée (55 points)", () => {
          const m = calculerMontants(profil({ points_nbi: 55 }));
          eq("montantNbi = 55 × 4.92278",          m.montantNbi,       270.75);
          eq("baseSoumisePC inclut NBI",            m.baseSoumisePC,    2545.07);
          eq("retenuePcNbi = montantNbi × 11,1%",  m.retenuePcNbi,     30.05);
          eq("retenuePC inchangée",                 m.retenuePC,        252.45);
          eq("csgDeductible augmente",              m.csgDeductible,    167.87);
          eq("csgNonDeductible",                    m.csgNonDeductible, 59.25);
          eq("crds",                                m.crds,             12.34);
          eq("totalPatronal",                       m.totalPatronal,    2553.97);
        });

        // ── T3 : Zone 1 (3%) ───────────────────────────────────────────────────
        suite("T3 — Zone de résidence 1 (3%)", () => {
          const m = calculerMontants(profil({ zone: "Zone 1" }));
          eq("indemniteResidence = floor(2274.32 × 3%) = 68.22", m.indemniteResidence, 68.22);
          eq("totalPrimesSoumises = résidence seule",            m.totalPrimesSoumises, 68.22);
          eq("RAFP = min(68.22, baseSoumisePC × 20%) × 5%",     m.cotisationRafp,      3.41);
          eq("csgDeductible",                                    m.csgDeductible,       154.34);
          eq("totalPatronal",                                    m.totalPatronal,       2285.69);
        });

        // ── T4 : SFT 2 enfants ─────────────────────────────────────────────────
        suite("T4 — SFT 2 enfants (10,67 + traitement × 3%)", () => {
          const m = calculerMontants(profil({ enfants: 2 }));
          eq("montantSFT = 10.67 + 2274.32 × 3% = 78.90",  m.montantSFT,           78.90);
          eq("csgDeductible augmente (SFT inclus)",          m.csgDeductible,        155.05);
          eq("csgNonDeductible",                             m.csgNonDeductible,     54.72);
          eq("crds",                                         m.crds,                 11.40);
          eq("totalPatronal inchangé (SFT exonéré PC)",      m.totalPatronal,        2282.28);
        });

        // ── T5 : 5 jours de grève ─────────────────────────────────────────────
        suite("T5 — Absences : 5 jours de grève (retenue 100%)", () => {
          const m = calculerMontants(profil({ evenements: {
            nuits:0, soirees:0, jours_greve:5, jours_carence:0,
            jours_maladie_90:0, jours_maladie_50:0, prime_performance:0,
            ott_pf:0, ott_pv_globale:0, ott_pv_opt32:0,
          }}));
          eq("absTraitement = 2274.32 / 30 × 5",        m.absTraitement,        379.05);
          eq("baseTraitementReel = 2274.32 − 379.05",   m.baseTraitementReel,   1895.27);
          eq("retenuePC recalculée sur base réelle",    m.retenuePC,            210.37);
          eq("transfertPrimes réduit par absence",      m.transfertPrimes,      27.02);
          eq("csgDeductible réduite",                   m.csgDeductible,        124.82);
          eq("totalPatronal réduit",                    m.totalPatronal,        1901.91);
        });

        // ── T6 : Maladie 90% ──────────────────────────────────────────────────
        suite("T6 — Absences : maladie 90% × 3 jours (retenue effective 10%)", () => {
          const m = calculerMontants(profil({ evenements: {
            nuits:0, soirees:0, jours_greve:0, jours_carence:0,
            jours_maladie_90:3, jours_maladie_50:0, prime_performance:0,
            ott_pf:0, ott_pv_globale:0, ott_pv_opt32:0,
          }}));
          // joursRetenus = 3 × 0.1 = 0.3
          // absTraitement = arrondir(2274.32/30 × 0.3) = arrondir(22.7432) = 22.74
          eq("absTraitement = 2274.32 / 30 × 0.3",        m.absTraitement,     22.74);
          eq("baseTraitementReel = 2274.32 − 22.74",      m.baseTraitementReel, 2251.58);
          eq("retenuePC",                                  m.retenuePC,          249.93);
          eq("csgDeductible",                              m.csgDeductible,      148.28);
        });

        // ── T7 : RIST Fonctions + Expérience + CSG ────────────────────────────
        suite("T7 — RIST Niv10 + Expérience Niv4 + CSG (profil type ING.DIV)", () => {
          const m = calculerMontants(profil({ primes: {
            forfait_mobilites:0, rist_fonctions:1591.62, rist_exper_prof:454.72,
            rist_lic_isq:0, rist_cplt_lic_isq:0, rist_maj_isq:0,
            attractivite:0, fidelisation:0, inflation:0,
            ind_compensatrice_csg:115.18, psc:0,
          }}));
          eq("totalPrimesSoumises = RIST + Exp + CSG",   m.totalPrimesSoumises, 2161.52);
          eq("RAFP plafonné à baseSoumisePC × 20%",       m.cotisationRafp,      22.74);
          eq("csgDeductible augmente fortement",          m.csgDeductible,       294.19);
          eq("csgNonDeductible",                          m.csgNonDeductible,    103.83);
          eq("crds",                                      m.crds,                21.63);
        });

        // ── T8 : ISQ Licence → retenue ISQ ────────────────────────────────────
        suite("T8 — ISQ Licence Niv5 (1976,11 €) → retenue ISQ 24,6%", () => {
          const m = calculerMontants(profil({ primes: {
            forfait_mobilites:0, rist_fonctions:0, rist_exper_prof:0,
            rist_lic_isq:1976.11, rist_cplt_lic_isq:0, rist_maj_isq:0,
            attractivite:0, fidelisation:0, inflation:0,
            ind_compensatrice_csg:0, psc:0,
          }}));
          eq("retenueIsq = 1976.11 × 24,6%",    m.retenueIsq,           486.12);
          eq("RAFP = baseSoumisePC × 20% × 5%", m.cotisationRafp,       22.74);
          // La retenueIsq déduit la base CSG → csgDeductible plus faible qu'en T7
          eq("csgDeductible",                    m.csgDeductible,        249.33);
          eq("csgNonDeductible",                 m.csgNonDeductible,     88.00);
          eq("crds",                             m.crds,                 18.33);
        });

        // ── T9 : RAFP plafonné ────────────────────────────────────────────────
        suite("T9 — RAFP plafonné (primes >>> 20% × baseSoumisePC)", () => {
          // baseSoumisePC = 2274.32 → plafond RAFP = 2274.32 × 20% = 454.86
          // totalPrimesSoumises = 68.22 + 1591.62 + 454.72 + 115.18 + 520 + 300 = 3049.74
          // baseRafp = min(3049.74, 454.86) → cotisationRafp = 454.86 × 5% = 22.74
          const m = calculerMontants(profil({ zone: "Zone 1", primes: {
            forfait_mobilites:0, rist_fonctions:1591.62, rist_exper_prof:454.72,
            rist_lic_isq:0, rist_cplt_lic_isq:0, rist_maj_isq:0,
            attractivite:520, fidelisation:300, inflation:0,
            ind_compensatrice_csg:115.18, psc:0,
          }}));
          eq("totalPrimesSoumises",                  m.totalPrimesSoumises, 3049.74);
          eq("RAFP plafonné = baseSoumisePC×20%×5%", m.cotisationRafp,      22.74);
          eq("csgDeductible",                        m.csgDeductible,       353.53);
        });

        // ── T10 : Nuits et soirées ────────────────────────────────────────────
        suite("T10 — Travail de nuit (8N + 4S2)", () => {
          const m = calculerMontants(profil({ evenements: {
            nuits:8, soirees:4, jours_greve:0, jours_carence:0,
            jours_maladie_90:0, jours_maladie_50:0, prime_performance:0,
            ott_pf:0, ott_pv_globale:0, ott_pv_opt32:0,
          }}));
          // nuit = arrondir(8.73 × 8 + 0.97 × 4) = arrondir(69.84 + 3.88) = 73.72
          eq("nuit = 8×8.73 + 4×0.97",     m.nuit,               73.72);
          eq("totalPrimesSoumises = nuit",  m.totalPrimesSoumises, 73.72);
          eq("cotisationRafp = 73.72×5%",   m.cotisationRafp,      3.69);
          eq("csgDeductible",               m.csgDeductible,       154.71);
          eq("totalPatronal",               m.totalPatronal,       2285.97);
        });

        // ── Rendu ─────────────────────────────────────────────────────────────
        afficherResultats();
      }

      function afficherResultats() {
        const out = document.getElementById("output");
        out.innerHTML = "";

        for (const s of suites) {
          const div = document.createElement("div");
          div.className = "suite";

          const titre = document.createElement("div");
          titre.className = "suite-title";
          const nbOk   = s.lignes.filter(l => l.ok).length;
          const nbFail = s.lignes.filter(l => !l.ok).length;
          const badge  = nbFail === 0 ? `✅ ${nbOk}/${s.lignes.length}` : `❌ ${nbFail} échec(s)`;
          titre.textContent = `${s.titre}   ${badge}`;
          div.appendChild(titre);

          for (const l of s.lignes) {
            const line = document.createElement("div");
            line.className = `line ${l.ok ? "pass" : "fail"}`;
            if (l.ok) {
              line.textContent = `✓  ${l.label}`;
            } else {
              line.innerHTML =
                `✗  ${l.label}` +
                `<div class="detail">obtenu : ${l.actual}  ·  attendu : ${l.expected}</div>`;
            }
            div.appendChild(line);
          }

          out.appendChild(div);
        }

        const summary = document.createElement("div");
        summary.className = `summary ${failed === 0 ? "all-pass" : "has-fail"}`;
        summary.textContent = failed === 0
          ? `✅  ${passed} assertions passées — aucun échec`
          : `❌  ${failed} échec(s) sur ${passed + failed} assertions`;
        out.appendChild(summary);
      }
    </script>
  </body>
</html>
