<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Tests — calculerMontants()</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: monospace;
        font-size: 13px;
        background: #0d1117;
        color: #c9d1d9;
        padding: 24px;
      }
      h1 {
        color: #58a6ff;
        margin-bottom: 4px;
        font-size: 16px;
      }
      .meta {
        color: #8b949e;

        font-size: 11px;
      }
      .suite {
        margin-bottom: 20px;
      }
      .suite-title {
        color: #e6edf3;
        font-size: 13px;
        font-weight: bold;
        border-left: 3px solid #30363d;
        padding-left: 10px;
        margin-bottom: 6px;
      }
      .line {
        padding: 3px 0 3px 14px;
        border-left: 3px solid transparent;
      }
      .pass {
        border-color: #238636;
        color: #3fb950;
      }
      .fail {
        border-color: #da3633;
        color: #f85149;
      }
      .fail .detail {
        color: #8b949e;

      }
      .summary {
        margin-top: 24px;
        padding: 12px 16px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: bold;
      }
      .summary.all-pass {
        background: #0f2d1a;
        color: #3fb950;
        border: 1px solid #238636;
      }
      .summary.has-fail {

        color: #f85149;
        border: 1px solid #da3633;
      }
    </style>
  </head>
  <body>
    <h1>🧪 Tests unitaires — calculerMontants()</h1>
    <p class="meta">Chargement de engine.js + data.json…</p>
    <div id="output"></div>

    <!-- engine.js en dernier pour récupérer les globaux après son chargement -->
    <script src="engine.js"></script>
    <script>
      // ─────────────────────────────────────────────────────────────────────────
      // On court-circuite window.onload défini par engine.js.
      // On charge data.json manuellement, puis on lance les tests.
      // ─────────────────────────────────────────────────────────────────────────
      window.onload = async () => {
        const meta = document.querySelector(".meta");

        try {
          const resp = await fetch("data.json");
          if (!resp.ok) throw new Error("Impossible de charger data.json");
          baseDonnees = await resp.json(); // injecte dans le global engine.js
          meta.textContent = `data.json chargé (barème ${baseDonnees.meta?.version ?? "?"})`;
        } catch (e) {
          meta.style.color = "#f85149";
          meta.textContent = `❌ ${e.message}`;
          return;
        }

        lancerTests();
      };

      // ─────────────────────────────────────────────────────────────────────────
      // Mini framework de test
      // ─────────────────────────────────────────────────────────────────────────
      let passed = 0,
        failed = 0;
      const suites = [];
      let currentSuite = null;

      function suite(titre, fn) {
        currentSuite = { titre, lignes: [] };
        suites.push(currentSuite);
        fn();
      }

      /**
       * Compare deux nombres après arrondi à 2 décimales pour absorber
       * les dérives floating-point des additions intermédiaires.
       */
      function eq(label, actual, expected) {
        const a = Math.round(actual * 100) / 100;
        const e = Math.round(expected * 100) / 100;
        if (a === e) {
          passed++;
          currentSuite.lignes.push({ ok: true, label });
        } else {
          failed++;
          currentSuite.lignes.push({ ok: false, label, actual: a, expected: e });
        }
      }

      /**
       * Vérifie qu'une valeur se situe dans un intervalle [min, max] — utile pour
       * contrôler un ordre de grandeur sans dépendre d'un arrondi exact.
       */
      function dansIntervalle(label, actual, min, max) {
        const a = Math.round(actual * 100) / 100;
        if (a >= min && a <= max) {
          passed++;
          currentSuite.lignes.push({ ok: true, label });
        } else {
          failed++;
          currentSuite.lignes.push({ ok: false, label, actual: a, expected: `[${min}, ${max}]` });
        }
      }

      // ─────────────────────────────────────────────────────────────────────────
      // Profil de base réutilisable — ING.DIV échelon 03, Zone 3, 0 enfant
      // ─────────────────────────────────────────────────────────────────────────
      function profil(overrides = {}) {
        return {
          grade: "ING.DIV. CONT.NAV.AE",
          echelon: "03",
          zone: "Zone 3",
          taux_pas: 0.196,
          points_nbi: 0,
          enfants: 0,
          evenements: {
            nuits: 0,
            soirees: 0,
            jours_greve: 0,
            jours_carence: 0,
            jours_maladie_90: 0,
            jours_maladie_50: 0,
            prime_performance: 0,
            ott_pf: 0,
            ott_pv_globale: 0,
            ott_pv_opt32: 0,
          },
          primes: {
            forfait_mobilites: 0,
            rist_fonctions: 0,
            rist_exper_prof: 0,
            rist_lic_isq: 0,
            rist_cplt_lic_isq: 0,
            rist_maj_isq: 0,
            geo_majo: 0,
            geo_majo_code: "",
            attractivite: 0,
            rembt_domicile: 0,
            fidelisation: 0,
            inflation: 0,
            ind_compensatrice_csg: 0,
            psc: 0,
          },
          ...overrides,
        };
      }

      // ─────────────────────────────────────────────────────────────────────────
      // TESTS
      // ─────────────────────────────────────────────────────────────────────────
      function lancerTests() {
        // ── T1 : Traitement de base ─────────────────────────────────────────────
        suite("T1 — Base seule (ING.DIV éch.03 | Zone 3 | 0 enfant)", () => {
          const m = calculerMontants(profil());
          eq("indice → traitementBrut = 462 × 4.92278", m.traitementBrut, 2274.32);
          eq("montantNbi = 0 (NBI désactivée)", m.montantNbi, 0);
          eq("indemniteResidence = 0 (Zone 3 = 0%)", m.indemniteResidence, 0);
          eq("baseSoumisePC = traitementBrut", m.baseSoumisePC, 2274.32);
          eq("retenuePC = baseSoumisePC × 11,1%", m.retenuePC, 252.45);
          eq("cotisationRafp = 0 (aucune prime)", m.cotisationRafp, 0);
          eq("transfertPrimes = 32,42 (aucune absence)", m.transfertPrimes, 32.42);
          eq("csgDeductible", m.csgDeductible, 149.78);
          eq("csgNonDeductible", m.csgNonDeductible, 52.86);
          eq("crds", m.crds, 11.01);
          eq("montantSFT = 0 (0 enfant)", m.montantSFT, 0);
          eq("totalPatronal", m.totalPatronal, 2282.28);
        });

        // ── T2 : NBI activée ───────────────────────────────────────────────────
        suite("T2 — NBI activée (55 points)", () => {
          const m = calculerMontants(profil({ points_nbi: 55 }));
          eq("montantNbi = 55 × 4.92278", m.montantNbi, 270.75);
          eq("baseSoumisePC inclut NBI", m.baseSoumisePC, 2545.07);
          eq("retenuePcNbi = montantNbi × 11,1%", m.retenuePcNbi, 30.05);
          eq("retenuePC inchangée", m.retenuePC, 252.45);
          eq("csgDeductible augmente", m.csgDeductible, 167.87);
          eq("csgNonDeductible", m.csgNonDeductible, 59.25);
          eq("crds", m.crds, 12.34);
          eq("totalPatronal", m.totalPatronal, 2553.97);
        });

        // ── T3 : Zone 1 (3%) ───────────────────────────────────────────────────
        suite("T3 — Zone de résidence 1 (3%)", () => {
          const m = calculerMontants(profil({ zone: "Zone 1" }));
          eq("indemniteResidence = floor(2274.32 × 3%) = 68.22", m.indemniteResidence, 68.22);
          eq("totalPrimesSoumises = résidence seule", m.totalPrimesSoumises, 68.22);
          eq("RAFP = min(68.22, baseSoumisePC × 20%) × 5%", m.cotisationRafp, 3.41);
          eq("csgDeductible", m.csgDeductible, 154.34);
          eq("totalPatronal", m.totalPatronal, 2285.69);
        });

        // ── T4 : SFT 2 enfants ─────────────────────────────────────────────────
        suite("T4 — SFT 2 enfants (10,67 + traitement × 3%)", () => {
          const m = calculerMontants(profil({ enfants: 2 }));
          eq("montantSFT = 10.67 + 2274.32 × 3% = 78.90", m.montantSFT, 78.9);
          eq("csgDeductible augmente (SFT inclus)", m.csgDeductible, 155.05);
          eq("csgNonDeductible", m.csgNonDeductible, 54.72);
          eq("crds", m.crds, 11.4);
          eq("totalPatronal inchangé (SFT exonéré PC)", m.totalPatronal, 2282.28);
        });

        // ── T5 : 5 jours de grève ─────────────────────────────────────────────
        suite("T5 — Absences : 5 jours de grève (retenue 100%)", () => {
          const m = calculerMontants(
            profil({
              evenements: {
                nuits: 0,
                soirees: 0,
                jours_greve: 5,
                jours_carence: 0,
                jours_maladie_90: 0,
                jours_maladie_50: 0,
                prime_performance: 0,
                ott_pf: 0,
                ott_pv_globale: 0,
                ott_pv_opt32: 0,
              },
            }),
          );
          eq("absTraitement = 2274.32 / 30 × 5", m.absTraitement, 379.05);
          eq("baseTraitementReel = 2274.32 − 379.05", m.baseTraitementReel, 1895.27);
          eq("retenuePC recalculée sur base réelle", m.retenuePC, 210.37);
          eq("transfertPrimes réduit par absence", m.transfertPrimes, 27.02);
          eq("csgDeductible réduite", m.csgDeductible, 124.82);
          eq("totalPatronal réduit", m.totalPatronal, 1901.91);
        });

        // ── T6 : Maladie 90% ──────────────────────────────────────────────────
        suite("T6 — Absences : maladie 90% × 3 jours (retenue effective 10%)", () => {
          const m = calculerMontants(
            profil({
              evenements: {
                nuits: 0,
                soirees: 0,
                jours_greve: 0,
                jours_carence: 0,
                jours_maladie_90: 3,
                jours_maladie_50: 0,
                prime_performance: 0,
                ott_pf: 0,
                ott_pv_globale: 0,
                ott_pv_opt32: 0,
              },
            }),
          );
          // joursRetenus = 3 × 0.1 = 0.3
          // absTraitement = arrondir(2274.32/30 × 0.3) = arrondir(22.7432) = 22.74
          eq("absTraitement = 2274.32 / 30 × 0.3", m.absTraitement, 22.74);
          eq("baseTraitementReel = 2274.32 − 22.74", m.baseTraitementReel, 2251.58);
          eq("retenuePC", m.retenuePC, 249.93);
          eq("csgDeductible", m.csgDeductible, 148.28);
        });

        // ── T7 : RIST Fonctions + Expérience + CSG ────────────────────────────
        suite("T7 — RIST Niv10 + Expérience Niv4 + CSG (profil type ING.DIV)", () => {
          const m = calculerMontants(
            profil({
              primes: {
                forfait_mobilites: 0,
                rist_fonctions: 1591.62,
                rist_exper_prof: 454.72,
                rist_lic_isq: 0,
                rist_cplt_lic_isq: 0,
                rist_maj_isq: 0,
                attractivite: 0,
                fidelisation: 0,
                inflation: 0,
                ind_compensatrice_csg: 115.18,
                psc: 0,
              },
            }),
          );
          eq("totalPrimesSoumises = RIST + Exp + CSG", m.totalPrimesSoumises, 2161.52);
          eq("RAFP plafonné à baseSoumisePC × 20%", m.cotisationRafp, 22.74);
          eq("csgDeductible augmente fortement", m.csgDeductible, 294.19);
          eq("csgNonDeductible", m.csgNonDeductible, 103.83);
          eq("crds", m.crds, 21.63);
        });

        // ── T8 : ISQ Licence → retenue ISQ ────────────────────────────────────
        suite("T8 — ISQ Licence Niv5 (1976,11 €) → retenue ISQ 24,6%", () => {
          const m = calculerMontants(
            profil({
              primes: {
                forfait_mobilites: 0,
                rist_fonctions: 0,
                rist_exper_prof: 0,
                rist_lic_isq: 1976.11,
                rist_cplt_lic_isq: 0,
                rist_maj_isq: 0,
                attractivite: 0,
                fidelisation: 0,
                inflation: 0,
                ind_compensatrice_csg: 0,
                psc: 0,
              },
            }),
          );
          eq("retenueIsq = 1976.11 × 24,6%", m.retenueIsq, 486.12);
          eq("RAFP = baseSoumisePC × 20% × 5%", m.cotisationRafp, 22.74);
          // La retenueIsq déduit la base CSG → csgDeductible plus faible qu'en T7
          eq("csgDeductible", m.csgDeductible, 249.33);
          eq("csgNonDeductible", m.csgNonDeductible, 88.0);
          eq("crds", m.crds, 18.33);
        });

        // ── T9 : RAFP plafonné ────────────────────────────────────────────────
        suite("T9 — RAFP plafonné (primes >>> 20% × baseSoumisePC)", () => {
          // baseSoumisePC = 2274.32 → plafond RAFP = 2274.32 × 20% = 454.86
          // totalPrimesSoumises = 68.22 + 1591.62 + 454.72 + 115.18 + 520 + 300 = 3049.74
          // baseRafp = min(3049.74, 454.86) → cotisationRafp = 454.86 × 5% = 22.74
          const m = calculerMontants(
            profil({
              zone: "Zone 1",
              primes: {
                forfait_mobilites: 0,
                rist_fonctions: 1591.62,
                rist_exper_prof: 454.72,
                rist_lic_isq: 0,
                rist_cplt_lic_isq: 0,
                rist_maj_isq: 0,
                attractivite: 520,
                fidelisation: 300,
                inflation: 0,
                ind_compensatrice_csg: 115.18,
                psc: 0,
              },
            }),
          );
          eq("totalPrimesSoumises", m.totalPrimesSoumises, 3049.74);
          eq("RAFP plafonné = baseSoumisePC×20%×5%", m.cotisationRafp, 22.74);
          eq("csgDeductible", m.csgDeductible, 353.53);
        });

        // ── T10 : Nuits et soirées ────────────────────────────────────────────
        suite("T10 — Travail de nuit (8N + 4S2)", () => {
          const m = calculerMontants(
            profil({
              evenements: {
                nuits: 8,
                soirees: 4,
                jours_greve: 0,
                jours_carence: 0,
                jours_maladie_90: 0,
                jours_maladie_50: 0,
                prime_performance: 0,
                ott_pf: 0,
                ott_pv_globale: 0,
                ott_pv_opt32: 0,
              },
            }),
          );
          // nuit = arrondir(8.73 × 8 + 0.97 × 4) = arrondir(69.84 + 3.88) = 73.72
          eq("nuit = 8×8.73 + 4×0.97", m.nuit, 73.72);
          eq("totalPrimesSoumises = nuit", m.totalPrimesSoumises, 73.72);
          eq("cotisationRafp = 73.72×5%", m.cotisationRafp, 3.69);
          eq("csgDeductible", m.csgDeductible, 154.71);
          eq("totalPatronal", m.totalPatronal, 2285.97);
        });

        // ── T11 : Totaux et nets ──────────────────────────────────────────────────────
        suite("T11 — Totaux colonnes + nets (profil type RIST+Exp+CSG, Zone 1, PAS 19,6%)", () => {
          const m = calculerMontants({
            grade: "ING.DIV. CONT.NAV.AE",
            echelon: "03",
            zone: "Zone 1",
            taux_pas: 0.196,
            points_nbi: 0,
            enfants: 0,
            evenements: {
              nuits: 0,
              soirees: 0,
              jours_greve: 0,
              jours_carence: 0,
              jours_maladie_90: 0,
              jours_maladie_50: 0,
              prime_performance: 0,
              ott_pf: 0,
              ott_pv_globale: 0,
              ott_pv_opt32: 0,
            },
            primes: {
              forfait_mobilites: 0,
              rist_fonctions: 1591.62,
              rist_exper_prof: 454.72,
              rist_lic_isq: 0,
              rist_cplt_lic_isq: 0,
              rist_maj_isq: 0,
              attractivite: 0,
              fidelisation: 0,
              inflation: 0,
              ind_compensatrice_csg: 115.18,
              psc: 0,
            },
          });
          eq("totalAPayer", m.totalAPayer, 4504.06); // ← inchangé, était juste
          eq("totalADeduire", m.totalADeduire, 733.77); // ← corrigé (était 727.26)
          eq("netAPayerAvantImpot", m.netAPayerAvantImpot, 3770.29); // ← corrigé (était 3776.80)
          eq("netImposableFinal", m.netImposableFinal, 3897.7); // ← corrigé (était 3902.26)
          eq("impotSource", m.impotSource, 763.95); // ← corrigé (était 764.84)
          eq("netFinal", m.netFinal, 3006.34); // ← corrigé (était 3011.96)
        });

        // ── T12 : PSC seule ───────────────────────────────────────────────────────────
        suite("T12 — PSC seule (15 €)", () => {
          const m = calculerMontants(
            profil({
              primes: {
                forfait_mobilites: 0,
                rist_fonctions: 0,
                rist_exper_prof: 0,
                rist_lic_isq: 0,
                rist_cplt_lic_isq: 0,
                rist_maj_isq: 0,
                attractivite: 0,
                fidelisation: 0,
                inflation: 0,
                ind_compensatrice_csg: 0,
                psc: 15,
              },
            }),
          );
          // La PSC n'alimente pas les primes soumises à cotisations ni le RAFP
          eq("psc stockée telle quelle", m.psc, 15);
          eq("totalPrimesSoumises inchangé (0)", m.totalPrimesSoumises, 0);
          eq("cotisationRafp reste nulle", m.cotisationRafp, 0);
          // La PSC est incluse dans la base CSG/CRDS
          eq("csgDeductible avec PSC 15 €", m.csgDeductible, 150.80);
          eq("csgNonDeductible avec PSC 15 €", m.csgNonDeductible, 53.22);
          eq("crds avec PSC 15 €", m.crds, 11.09);
          // Et le Net social est diminué du montant PSC
          eq("netSocial = netAPayerAvantImpot − PSC", m.netSocial, m.netAPayerAvantImpot - 15);
        });

        // ── T13 : Forfait Mobilités seul ──────────────────────────────────────────────
        suite("T13 — Forfait Mobilités seul (200 €)", () => {
          const m = calculerMontants(
            profil({
              primes: {
                forfait_mobilites: 200,
                rist_fonctions: 0,
                rist_exper_prof: 0,
                rist_lic_isq: 0,
                rist_cplt_lic_isq: 0,
                rist_maj_isq: 0,
                attractivite: 0,
                fidelisation: 0,
                inflation: 0,
                ind_compensatrice_csg: 0,
                psc: 0,
              },
            }),
          );
          // Le FMD ne compte pas dans les primes soumises à cotisations ni dans la base CSG
          eq("totalPrimesSoumises reste 0", m.totalPrimesSoumises, 0);
          eq("cotisationRafp toujours nulle", m.cotisationRafp, 0);
          eq("csgDeductible identique à T1", m.csgDeductible, 149.78);
          eq("csgNonDeductible identique à T1", m.csgNonDeductible, 52.86);
          eq("crds identique à T1", m.crds, 11.01);
          // Le Net social exclut le FMD
          eq("netSocial = netAPayerAvantImpot − FMD", m.netSocial, m.netAPayerAvantImpot - 200);
        });

        // ── T14 : Attractivité + Fidélisation ────────────────────────────────────────
        suite("T14 — Attractivité 150 € + Fidélisation 300 €", () => {
          const m = calculerMontants(
            profil({
              primes: {
                forfait_mobilites: 0,
                rist_fonctions: 0,
                rist_exper_prof: 0,
                rist_lic_isq: 0,
                rist_cplt_lic_isq: 0,
                rist_maj_isq: 0,
                attractivite: 150,
                fidelisation: 300,
                inflation: 0,
                ind_compensatrice_csg: 0,
                psc: 0,
              },
            }),
          );
          // Ces deux primes sont intégralement soumises à cotisations et RAFP
          eq("totalPrimesSoumises = 150 + 300", m.totalPrimesSoumises, 450);
          // Plafond RAFP : baseSoumisePC × 20% = 2274.32 × 0.2 = 454.864 > 450 → pas de plafonnement
          eq("cotisationRafp = 450 × 5%", m.cotisationRafp, 22.5);
        });

        // ── T15 : Absences combinées ────────────────────────────────────────────────
        suite("T15 — Absences combinées (grève + carence + maladie 90% + 50%)", () => {
          const m = calculerMontants(
            profil({
              evenements: {
                nuits: 0,
                soirees: 0,
                jours_greve: 2,
                jours_carence: 1,
                jours_maladie_90: 3,
                jours_maladie_50: 4,
                prime_performance: 0,
                ott_pf: 0,
                ott_pv_globale: 0,
                ott_pv_opt32: 0,
              },
            }),
          );
          // joursAbs = 2 + 1 + 3 + 4 = 10
          eq("joursAbs = somme brute des jours", m.joursAbs, 10);
          // joursRetenus = grève(100%) + carence(100%) + 0.1×maladie90 + 0.5×maladie50 = 2 + 1 + 0.3 + 2 = 5.3
          eq("joursRetenus pondérés", m.joursRetenus, 5.3);
          // absTraitement = arrondir(2274.32 / 30 × 5.3)
          eq("absTraitement (règle du 1/30e pondéré)", m.absTraitement, 401.8);
          eq("baseTraitementReel = traitementBrut − absTraitement", m.baseTraitementReel, m.traitementBrut - 401.8);
        });

        // ── T16 : Protocole OTT (PF + PV) ───────────────────────────────────────────
        suite("T16 — Protocole OTT (PF 345 € + PV 1000 € + PV Opt32 200 €)", () => {
          const m = calculerMontants(
            profil({
              evenements: {
                nuits: 0,
                soirees: 0,
                jours_greve: 0,
                jours_carence: 0,
                jours_maladie_90: 0,
                jours_maladie_50: 0,
                prime_performance: 0,
                ott_pf: 345,
                ott_pv_globale: 1000,
                ott_pv_opt32: 200,
              },
            }),
          );
          // Les trois composantes OTT alimentent les primes soumises à RAFP
          eq("totalPrimesSoumises = 345 + 1000 + 200", m.totalPrimesSoumises, 1545);
          // Plafond RAFP : baseSoumisePC × 20% = 454.864 < 1545 → plafonné
          eq("cotisationRafp plafonnée = baseSoumisePC×20%×5%", m.cotisationRafp, 22.74);
        });

        // ── T17 : calculerAnnuel() — cas vide ───────────────────────────────────
        suite("T17 — calculerAnnuel() : aucun ponctuel (profil de base = 0)", () => {
          const { annuel, mensuelMoyen, detail } = calculerAnnuel({
            nuitsAnnuelles: 0, soireesAnnuelles: 0,
            ottPv: 0, ottPv32: 0, ppp: 0, fmd: 0, libres: [],
          });
          eq("annuel.brut = 0 (aucune saisie)", annuel.brut, 0);
          eq("annuel.netApresImpot = 0", annuel.netApresImpot, 0);
          eq("mensuelMoyen.brut = 0", mensuelMoyen.brut, 0);
          eq("annuel.brut = mensuelMoyen.brut × 12", annuel.brut, mensuelMoyen.brut * 12);
          eq("detail.length = 0 (aucun ponctuel renseigné)", detail.length, 0);
        });

        // ── T18 : calculerAnnuel() — cas complet ────────────────────────────────
        suite("T18 — calculerAnnuel() : nuits + OTT + PPP + FMD + prime libre", () => {
          const { annuel, mensuelMoyen, detail } = calculerAnnuel({
            nuitsAnnuelles: 24, soireesAnnuelles: 12,
            ottPv: 3600, ottPv32: 600, ppp: 1200, fmd: 240,
            libres: [{ libelle: "Prime except.", montant: 150 }],
          });
          // Cohérence du pipeline : le total annuel doit toujours valoir 12× la moyenne
          // mensuelle, quel que soit l'arrondi exact appliqué en interne (cf. T19).
          eq("annuel.brut = mensuelMoyen.brut × 12", annuel.brut, mensuelMoyen.brut * 12);
          eq("annuel.netApresImpot = mensuelMoyen.netApresImpot × 12", annuel.netApresImpot, mensuelMoyen.netApresImpot * 12);
          eq("annuel.coutEmployeur = mensuelMoyen.coutEmployeur × 12", annuel.coutEmployeur, mensuelMoyen.coutEmployeur * 12);
          // Somme brute des ponctuels : 221.16 (nuits+soirées) + 3600 + 600 + 1200 + 150 + 240 = 6011.16
          dansIntervalle("annuel.brut ≈ somme des ponctuels (± quelques centimes d'arrondi)", annuel.brut, 5900, 6100);
          eq("detail.length = 6 (nuits, ottPv, ottPv32, ppp, fmd, libre)", detail.length, 6);
        });

        // ── T19 : écart (attendu) entre détail affiché et montant réellement cotisé ─
        suite("T19 — Écart détail affiché vs cotisé (arrondi ÷12 puis ×12) — comportement voulu", () => {
          // Le "détail" affiché à l'utilisateur (montantNuitsAnnuel) est calculé
          // directement depuis la saisie brute annuelle, SANS passer par l'arrondi
          // mensuel ÷12 puis ×12 qu'utilise le calcul réel des cotisations
          // (profilMoyen, engine.js:4156-4167). Avec des valeurs qui ne tombent pas
          // rond après division par 12, un écart de quelques centimes apparaît entre
          // le montant affiché et le montant réellement cotisé. Vérifié par rapport
          // à de vraies valeurs de référence : c'est le calcul mensuel ÷12 puis ×12
          // qui est correct (12 vrais bulletins mensuels, arrondis au centime) — ne
          // pas "corriger" ce test en alignant les deux valeurs, il documente un
          // comportement voulu, pas un défaut.
          const { detail } = calculerAnnuel({
            nuitsAnnuelles: 25, soireesAnnuelles: 13,
            ottPv: 0, ottPv32: 0, ppp: 0, fmd: 0, libres: [],
          });
          const montantAffiche = detail.find((d) => d.libelle.startsWith("Nuits"))?.montant ?? 0;
          eq('Montant "Nuits" affiché = 25×8.73 + 13×0.97 (calcul brut direct)', montantAffiche, 230.86);
          const montantReellementCotise = arrondir(arrondir(montantAffiche / 12) * 12);
          eq("Montant réellement intégré au brut (arrondi ÷12 puis ×12) — 0,02 € d'écart avec l'affiché", montantReellementCotise, 230.88);
        });

        // ── T20 : Comparateur A/B — échelon différent ───────────────────────────
        suite("T20 — Comparateur A/B : échelon différent (03 vs 07)", () => {
          const mA = calculerMontants(profil({ echelon: "03" }));
          const mB = calculerMontants(profil({ echelon: "07" }));
          eq("mA.traitementBrut = 2274.32 (réf. T1)", mA.traitementBrut, 2274.32);
          eq("mB.traitementBrut > mA.traitementBrut (indice supérieur)", mB.traitementBrut > mA.traitementBrut ? 1 : 0, 1);
          eq("mB.totalPatronal ≠ mA.totalPatronal (delta non nul)", mB.totalPatronal !== mA.totalPatronal ? 1 : 0, 1);
        });

        // ── T21 : Comparateur A/B — RIST différent ──────────────────────────────
        suite("T21 — Comparateur A/B : RIST différent (A sans RIST vs B avec RIST fonctions 300 €)", () => {
          const mA = calculerMontants(profil());
          const mB = calculerMontants(profil({ primes: { ...profil().primes, rist_fonctions: 300 } }));
          eq("mA.totalPrimesSoumises = 0 (sans RIST)", mA.totalPrimesSoumises, 0);
          eq("mB.totalPrimesSoumises = 300 (RIST fonctions)", mB.totalPrimesSoumises, 300);
          eq("mB.cotisationRafp > mA.cotisationRafp (RAFP sur RIST)", mB.cotisationRafp > mA.cotisationRafp ? 1 : 0, 1);
          eq("mA.totalPrimesSoumises reste 0 après calcul de mB (pas de fuite d'état partagé)", mA.totalPrimesSoumises, 0);
        });

        // ── T22 : Comparateur A/B — zone + SFT différents ───────────────────────
        suite("T22 — Comparateur A/B : zone + SFT différents (A Zone3/0 enfant vs B Zone1/2 enfants)", () => {
          const mA = calculerMontants(profil({ zone: "Zone 3", enfants: 0 }));
          const mB = calculerMontants(profil({ zone: "Zone 1", enfants: 2 }));
          eq("mA.indemniteResidence = 0 (Zone 3)", mA.indemniteResidence, 0);
          eq("mB.indemniteResidence = 68.22 (Zone 1, réf. T3)", mB.indemniteResidence, 68.22);
          eq("mA.montantSFT = 0 (0 enfant)", mA.montantSFT, 0);
          eq("mB.montantSFT = 78.90 (2 enfants, réf. T4)", mB.montantSFT, 78.9);
          eq("mA.totalPatronal ≠ mB.totalPatronal (profils bien distincts)", mA.totalPatronal !== mB.totalPatronal ? 1 : 0, 1);
        });

        // ── T23 : Comparateur — héritage du panneau B à l'activation ───────────
        suite("T23 — Comparateur : héritage ALAN/geo-majo à l'activation + enfants=0 en B", () => {
          // Fixture DOM minimale : les éléments écrits SANS garde par activerComparaison()
          // (cmp-input-*, cmp-attractivite, cmp-fidelisation, cmp-pv-*) + ceux nécessaires
          // aux assertions. Pas de cmp-grade (évite mettreAJourEchelonsB) ni de
          // panneau-comparaison / mobile-bottom-bar (accès gardés dans engine.js).
          const fx = document.createElement("div");
          fx.hidden = true;
          fx.innerHTML = `
            <input id="input-grade"   value="ING.DIV. CONT.NAV.AE" />
            <input id="input-echelon" value="03" />
            <input id="input-enfants" value="2" />
            <input type="radio" name="geo-majo-radio" value="163.29" data-code="201987" checked />
            <input id="alan-forfait" value="30.5" /><input id="alan-solidaire" value="2" />
            <input id="alan-action-sociale" value="" /><input id="alan-aide-retraites" value="" />
            <input id="alan-employeur" value="" />
            <select id="cmp-input-fonction"></select><select id="cmp-input-experience"></select>
            <select id="cmp-input-isq-licence"></select><select id="cmp-input-isq-complement"></select>
            <select id="cmp-input-isq-majoration"></select>
            <input id="cmp-attractivite" value="" /><input id="cmp-fidelisation" value="" />
            <input id="cmp-pv-globale" value="" /><input id="cmp-pv-opt32" value="" />
            <input id="cmp-enfants" value="" />
            <input id="cmp-alan-forfait" value="0" /><input id="cmp-alan-solidaire" value="0" />
            <input id="cmp-alan-action-sociale" value="0" /><input id="cmp-alan-aide-retraites" value="0" />
            <input id="cmp-alan-employeur" value="0" />
            <select id="cmp-geo-majo">
              <option value="0" data-code="">Aucune</option>
              <option value="163.29" data-code="201987">Nord / Nord-Est</option>
              <option value="0" data-code="201986">CDG / CRNA Ouest</option>
            </select>
          `;
          document.body.appendChild(fx);
          const calculerPaieOrig = window.calculerPaie;
          window.calculerPaie = () => {}; // neutralise le rendu (pas de fiche dans tests.html)
          try {
            window.activerComparaison();
            const pA = getProfilDepuisInterface();
            const pB = getProfilComparaisonDepuisPanneau();

            eq("cmp-alan-forfait pré-rempli depuis A (30.50)", parseFloat(document.getElementById("cmp-alan-forfait").value), 30.5);
            eq("profil B hérite alan.forfait (30.50)", pB.alan.forfait, 30.5);
            eq("profil B hérite alan.solidaire (2.00)", pB.alan.solidaire, 2);
            eq("cmp-geo-majo sélectionné par code (201987) et non par montant", document.getElementById("cmp-geo-majo").selectedOptions[0].dataset.code === "201987" ? 1 : 0, 1);
            eq("profil B hérite geo_majo (163.29)", pB.primes.geo_majo, 163.29);
            eq("cmp-enfants pré-rempli depuis A (2)", parseInt(document.getElementById("cmp-enfants").value, 10), 2);

            // Invariant : à l'activation, B est strictement identique à A → aucun delta
            const mA = calculerMontants(pA);
            const mB = calculerMontants(pB);
            eq("netFinal A > 0 (invariant non trivial)", mA.netFinal > 0 ? 1 : 0, 1);
            eq("netFinal B = netFinal A (delta 0 à l'activation)", mB.netFinal, mA.netFinal);
            eq("totalPatronal B = totalPatronal A", mB.totalPatronal, mA.totalPatronal);

            // "0 enfant" en B ne doit plus retomber sur la valeur de A (0 est falsy)
            document.getElementById("cmp-enfants").value = "0";
            eq("cmp-enfants = 0 → profil B a 0 enfant (plus d'héritage forcé)", getProfilComparaisonDepuisPanneau().enfants, 0);
            document.getElementById("cmp-enfants").value = "";
            eq("cmp-enfants vide → hérite de A (2 enfants)", getProfilComparaisonDepuisPanneau().enfants, 2);
          } finally {
            // desactiverComparaison AVANT de restaurer calculerPaie : le vrai rendu
            // planterait sans le DOM d'index.html
            window.desactiverComparaison();
            window.calculerPaie = calculerPaieOrig;
            fx.remove();
          }
        });

        // ── T24 : Rappels — impact calcul (4 flux) ──────────────────────────────
        suite("T24 — Rappels : imposable ±, non imposable, PSC/prévoyance (assiette CSG sans abattement)", () => {
          const cst = baseDonnees.constantes;
          const m0 = calculerMontants(profil());
          const avecRappels = (over) => calculerMontants(profil({ primes: { ...profil().primes, ...over } }));

          // Rappel imposable positif → colonne À Payer + assiettes RAFP/CSG
          const mPlus = avecRappels({ rappels_imposables: 100 });
          eq("imposable +100 : totalAPayer = base + 100", mPlus.totalAPayer, m0.totalAPayer + 100);
          eq("imposable +100 : soumis à RAFP (5.00)", mPlus.cotisationRafp, 5);
          eq("imposable +100 : CSG déductible augmente", mPlus.csgDeductible > m0.csgDeductible ? 1 : 0, 1);

          // Rappel imposable négatif (trop-perçu) → colonne À Déduire, pas À Payer
          const mMoins = avecRappels({ rappels_imposables: -50 });
          eq("imposable −50 : totalAPayer inchangé", mMoins.totalAPayer, m0.totalAPayer);
          eq("imposable −50 : totalPrimesSoumises = −50 (algébrique)", mMoins.totalPrimesSoumises, -50);
          eq("imposable −50 : net avant impôt diminue", mMoins.netAPayerAvantImpot < m0.netAPayerAvantImpot ? 1 : 0, 1);

          // Rappel non imposable → payé mais exclu du net imposable et du net social
          const mNonImp = avecRappels({ rappels_non_imposables: 100 });
          eq("non imposable +100 : totalAPayer = base + 100", mNonImp.totalAPayer, m0.totalAPayer + 100);
          eq("non imposable +100 : RAFP inchangée (hors assiette)", mNonImp.cotisationRafp, m0.cotisationRafp);
          eq("non imposable +100 : netImposableFinal inchangé", mNonImp.netImposableFinal, m0.netImposableFinal);
          eq("non imposable +100 : netSocial inchangé", mNonImp.netSocial, m0.netSocial);
          eq("non imposable +100 : netFinal = base + 100", mNonImp.netFinal, m0.netFinal + 100);

          // Rappel PSC/prévoyance : imposable, mais ajouté à l'assiette CSG SANS
          // l'abattement 0.9825 (règle métier validée vs bulletins réels — ne pas "corriger",
          // cf. engine.js, calcul de pscSansAbat / totalPrimesSoumisesHorsPSC)
          const mPsc = avecRappels({ rappels_imposables: 20, rappels_psc_prevoyance: 20 });
          const basePscAttendue = Math.max(0, arrondir(
            (mPsc.baseSoumisePC + (mPsc.totalPrimesSoumises - 20) + mPsc.montantSFT - mPsc.transfertPrimes - mPsc.retenueIsq)
              * cst.assiette_csg_crds + 20,
          ));
          eq("PSC +20 : CSG déductible = base(+20 hors abattement) × 6,8 %", mPsc.csgDeductible, arrondir(basePscAttendue * cst.taux_csg_deductible));
          eq("PSC +20 : CRDS = base(+20 hors abattement) × 0,5 %", mPsc.crds, arrondir(basePscAttendue * cst.taux_crds));
          eq("PSC +20 : netSocial réduit du rappel PSC", mPsc.netSocial, arrondir(mPsc.netAPayerAvantImpot - 20 + mPsc.retenueIsq));
        });

        // ── T25 : Primes manuelles ──────────────────────────────────────────────
        suite("T25 — Primes manuelles : imposable, non imposable, mix", () => {
          const m0 = calculerMontants(profil());
          const avecPrimes = (over) => calculerMontants(profil({ primes: { ...profil().primes, ...over } }));

          const mImp = avecPrimes({ manuelles_imposables: 100 });
          eq("imposable 100 : totalAPayer = base + 100", mImp.totalAPayer, m0.totalAPayer + 100);
          eq("imposable 100 : soumise à RAFP (5.00)", mImp.cotisationRafp, 5);
          eq("imposable 100 : net imposable augmente", mImp.netImposableFinal > m0.netImposableFinal ? 1 : 0, 1);

          const mNon = avecPrimes({ manuelles_non_imposables: 100 });
          eq("non imposable 100 : totalAPayer = base + 100", mNon.totalAPayer, m0.totalAPayer + 100);
          eq("non imposable 100 : RAFP inchangée (hors assiette)", mNon.cotisationRafp, m0.cotisationRafp);
          eq("non imposable 100 : netImposableFinal inchangé", mNon.netImposableFinal, m0.netImposableFinal);
          eq("non imposable 100 : netSocial inchangé (même traitement que FMD)", mNon.netSocial, m0.netSocial);
          eq("non imposable 100 : netFinal = base + 100", mNon.netFinal, m0.netFinal + 100);

          const mMix = avecPrimes({ manuelles_imposables: 100, manuelles_non_imposables: 50 });
          eq("mix 100 + 50 : totalAPayer = base + 150", mMix.totalAPayer, m0.totalAPayer + 150);
          eq("mix : seule la part imposable passe en RAFP (5.00)", mMix.cotisationRafp, 5);
        });

        // ── T26 : SFT aux bornes d'indice (plancher 449 / plafond 717) ──────────
        suite("T26 — SFT : bornes plancher/plafond du traitement de référence", () => {
          const vp = baseDonnees.constantes.valeur_point_mensuel;

          // Traitement très bas → référence bloquée au plancher (449 × vp = 2210.33)
          eq("2 enfants, traitement 100 € → SFT sur plancher (76.98)", calculerSFT(2, 100, vp), 76.98);
          // Traitement très haut → référence bloquée au plafond (717 × vp = 3529.63)
          eq("2 enfants, traitement 999999 € → SFT sur plafond (116.56)", calculerSFT(2, 999999, vp), 116.56);

          // Intégration grades réels : ING.DIV éch.01 (2047.88 < plancher)
          const mBas = calculerMontants(profil({ echelon: "01", enfants: 2 }));
          eq("ING.DIV éch.01, 2 enfants : SFT plancher (76.98)", mBas.montantSFT, 76.98);

          // ING. EN CHEF HEA2/HEA3 (4578.19 / 4809.56 > plafond) → même SFT
          const mHea2 = calculerMontants(profil({ grade: "ING. EN CHEF CONT.NAV.AE", echelon: "HEA2", enfants: 2 }));
          const mHea3 = calculerMontants(profil({ grade: "ING. EN CHEF CONT.NAV.AE", echelon: "HEA3", enfants: 2 }));
          eq("ING. EN CHEF HEA3, 2 enfants : SFT plafond (116.56)", mHea3.montantSFT, 116.56);
          eq("HEA2 = HEA3 (tous deux au-dessus du plafond)", mHea2.montantSFT, mHea3.montantSFT);

          // Barème 3 et 4+ enfants (référence entre les bornes : éch.03 = 2274.32)
          eq("3 enfants : 15.24 + réf × 8 % (197.19)", calculerMontants(profil({ enfants: 3 })).montantSFT, 197.19);
          eq("4 enfants : + (4.57 + réf × 6 %) par enfant sup. (338.21)", calculerMontants(profil({ enfants: 4 })).montantSFT, 338.21);
        });

        // ── T27 : SFT — 0 vs 1 enfant ───────────────────────────────────────────
        suite("T27 — SFT : 0 enfant (aucun) vs 1 enfant (part fixe)", () => {
          eq("0 enfant : SFT = 0", calculerMontants(profil()).montantSFT, 0);
          eq("1 enfant : SFT = 2.29 (fixe, indépendant du traitement)", calculerMontants(profil({ enfants: 1 })).montantSFT, 2.29);
          const vp = baseDonnees.constantes.valeur_point_mensuel;
          eq("1 enfant : identique quel que soit le traitement", calculerSFT(1, 999999, vp), 2.29);
        });

        // ── T28 : RAFP sous le plafond (complète T9/T14 qui testent le plafonnement) ─
        suite("T28 — RAFP : primes sous 20 % du traitement → assiette = primes", () => {
          const m = calculerMontants(profil({ primes: { ...profil().primes, rist_fonctions: 100 } }));
          // 100 € < 20 % × 2274.32 = 454.86 → assiette non plafonnée
          eq("RAFP = 100 × 5 % = 5.00 (non plafonnée)", m.cotisationRafp, 5);
          eq("RAFP patronale = RAFP salariale", m.charges.patRafp, m.cotisationRafp);
        });

        // ── T29 : Indemnité de résidence — troncature volontaire ────────────────
        suite("T29 — Indemnité de résidence : troncature au centime (Math.floor), pas arrondi", () => {
          // ING.DIV éch.02 Zone 1 : 2151.25 × 3 % = 64.5375 → tronqué à 64.53
          // (arrondir() donnerait 64.54). Comportement constaté sur bulletins réels —
          // ne pas "corriger" ce test en harmonisant avec arrondir(), il verrouille
          // une troncature voulue (cf. commentaire engine.js, calcul indemniteResidence).
          const m = calculerMontants(profil({ echelon: "02", zone: "Zone 1" }));
          eq("éch.02 Zone 1 : 64.53 (tronqué, et non 64.54 arrondi)", m.indemniteResidence, 64.53);
        });

        // ── Rendu ─────────────────────────────────────────────────────────────
        afficherResultats();
      }

      function afficherResultats() {
        const out = document.getElementById("output");
        out.innerHTML = "";

        for (const s of suites) {
          const div = document.createElement("div");
          div.className = "suite";

          const titre = document.createElement("div");
          titre.className = "suite-title";
          const nbOk = s.lignes.filter((l) => l.ok).length;
          const nbFail = s.lignes.filter((l) => !l.ok).length;
          const badge = nbFail === 0 ? `✅ ${nbOk}/${s.lignes.length}` : `❌ ${nbFail} échec(s)`;
          titre.textContent = `${s.titre}   ${badge}`;
          div.appendChild(titre);

          for (const l of s.lignes) {
            const line = document.createElement("div");
            line.className = `line ${l.ok ? "pass" : "fail"}`;
            if (l.ok) {
              line.textContent = `✓  ${l.label}`;
            } else {
              line.innerHTML = `✗  ${l.label}` + `<div class="detail">obtenu : ${l.actual}  ·  attendu : ${l.expected}</div>`;
            }
            div.appendChild(line);
          }

          out.appendChild(div);
        }

        const summary = document.createElement("div");
        summary.className = `summary ${failed === 0 ? "all-pass" : "has-fail"}`;
        summary.textContent = failed === 0 ? `✅  ${passed} assertions passées — aucun échec` : `❌  ${failed} échec(s) sur ${passed + failed} assertions`;
        out.appendChild(summary);
      }
    </script>
  </body>
